<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Warhammer 40K Rules Assistant</title>
<style>
  :root {
    --bg:        #0d0d0d;
    --surface:   #161616;
    --border:    #2a2a2a;
    --gold:      #c9a84c;
    --gold-dim:  #8a6f2e;
    --red:       #8b1a1a;
    --text:      #d4c9b0;
    --text-dim:  #7a7060;
    --user-bg:   #1e1610;
    --ai-bg:     #111111;
    --scrollbar: #2a2a2a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: var(--surface);
    border-bottom: 2px solid var(--gold-dim);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  .aquila { font-size: 28px; color: var(--gold); line-height: 1; }
  .header-text h1 {
    font-size: 16px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--gold);
  }
  .header-text p {
    font-size: 11px; color: var(--text-dim);
    letter-spacing: 1px; text-transform: uppercase;
  }
  .db-badge {
    margin-left: auto; background: var(--bg);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 4px 10px; font-size: 11px; color: var(--text-dim); white-space: nowrap;
  }
  .db-badge span { color: var(--gold); font-weight: 600; }

  .layout { display: flex; flex: 1; overflow: hidden; }

  aside {
    width: 240px; background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
  }
  .sidebar-header {
    padding: 12px 14px; border-bottom: 1px solid var(--border);
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--gold-dim); font-weight: 700;
  }
  .source-list { overflow-y: auto; flex: 1; padding: 8px 0; }
  .source-list::-webkit-scrollbar { width: 4px; }
  .source-list::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 2px; }
  .source-item {
    padding: 5px 14px; font-size: 11px; color: var(--text-dim);
    border-left: 2px solid transparent; transition: all 0.15s; line-height: 1.4;
  }
  .source-item:hover {
    color: var(--text); border-left-color: var(--gold-dim);
    background: rgba(201,168,76,0.04);
  }

  .chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .messages {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

  .msg { max-width: 820px; width: 100%; align-self: flex-start; }
  .msg.user { align-self: flex-end; }

  .msg-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 5px; padding: 0 4px; }
  .msg.user .msg-label { color: var(--gold-dim); text-align: right; }
  .msg.assistant .msg-label { color: var(--text-dim); }

  .msg-bubble {
    padding: 12px 16px; border-radius: 4px; font-size: 14px;
    line-height: 1.7; border: 1px solid var(--border);
    white-space: pre-wrap; word-break: break-word;
  }
  .msg.user .msg-bubble {
    background: var(--user-bg); border-color: var(--gold-dim); border-radius: 4px 4px 0 4px;
  }
  .msg.assistant .msg-bubble { background: var(--ai-bg); border-radius: 4px 4px 4px 0; }

  .typing .msg-bubble::after {
    content: '▋'; animation: blink 0.8s step-end infinite; color: var(--gold);
  }
  @keyframes blink { 50% { opacity: 0; } }

  .welcome { text-align: center; margin: auto; color: var(--text-dim); }
  .welcome .icon { font-size: 48px; margin-bottom: 12px; }
  .welcome h2 { font-size: 18px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .welcome p { font-size: 13px; line-height: 1.6; max-width: 400px; }

  .input-bar {
    border-top: 1px solid var(--border); padding: 14px 20px;
    display: flex; gap: 10px; background: var(--surface); flex-shrink: 0;
  }
  textarea {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); font-family: inherit;
    font-size: 14px; padding: 10px 14px; resize: none;
    height: 44px; max-height: 140px; overflow-y: auto;
    transition: border-color 0.2s; line-height: 1.5;
  }
  textarea:focus { outline: none; border-color: var(--gold-dim); }
  textarea::placeholder { color: var(--text-dim); }

  button#send-btn {
    background: var(--red); border: 1px solid #a02020; border-radius: 4px;
    color: var(--gold); font-size: 13px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; padding: 0 20px; cursor: pointer;
    transition: background 0.2s; white-space: nowrap;
  }
  button#send-btn:hover:not(:disabled) { background: #a02020; }
  button#send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  button#clear-btn {
    background: transparent; border: 1px solid var(--border); border-radius: 4px;
    color: var(--text-dim); font-size: 12px; padding: 0 12px; cursor: pointer; transition: all 0.2s;
  }
  button#clear-btn:hover { border-color: var(--gold-dim); color: var(--text); }
</style>
</head>
<body>

<header>
  <div class="aquila">⚜</div>
  <div class="header-text">
    <h1>Warhammer 40K Rules Assistant</h1>
    <p>Adeptus Mechanicus RAG System — Local Intelligence</p>
  </div>
  <div class="db-badge" id="db-badge">Loading database…</div>
</header>

<div class="layout">
  <aside>
    <div class="sidebar-header">📚 Indexed Sources</div>
    <div class="source-list" id="source-list">
      <div class="source-item">Loading…</div>
    </div>
  </aside>

  <div class="chat-panel">
    <div class="messages" id="messages">
      <div class="welcome">
        <div class="icon">⚔️</div>
        <h2>For the Emperor</h2>
        <p>Ask me anything about Warhammer 40,000 rules, stat blocks, weapon profiles, stratagems, and faction abilities.</p>
      </div>
    </div>
    <div class="input-bar">
      <textarea id="input" placeholder="Ask about rules, units, weapons, stratagems…" rows="1"></textarea>
      <button id="clear-btn" title="Clear conversation">Clear</button>
      <button id="send-btn">Send</button>
    </div>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send-btn');
  const clearBtn   = document.getElementById('clear-btn');
  const dbBadge    = document.getElementById('db-badge');
  const sourceList = document.getElementById('source-list');

  let history   = [];
  let streaming = false;

  async function loadDbInfo() {
    try {
      const res  = await fetch('/db-info');
      const data = await res.json();
      dbBadge.innerHTML = `<span>${data.total_chunks.toLocaleString()}</span> chunks indexed`;
      sourceList.innerHTML = data.sources
        .map(s => `<div class="source-item" title="${s}">${s}</div>`)
        .join('');
    } catch {
      dbBadge.textContent = 'DB unavailable';
      sourceList.innerHTML = '<div class="source-item">Could not load sources</div>';
    }
  }

  function addMessage(role, text, typing = false) {
    const welcome = messagesEl.querySelector('.welcome');
    if (welcome) welcome.remove();
    const div = document.createElement('div');
    div.className = `msg ${role}${typing ? ' typing' : ''}`;
    div.innerHTML = `
      <div class="msg-label">${role === 'user' ? 'You' : 'Adeptus Cogitator'}</div>
      <div class="msg-bubble">${escHtml(text)}</div>
    `;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function updateBubble(div, text) {
    div.querySelector('.msg-bubble').textContent = text;
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text || streaming) return;

    streaming = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = '44px';

    history.push({ role: 'user', content: text });
    addMessage('user', text);

    const aiDiv = addMessage('assistant', '', true);
    let aiText  = '';

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });
      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        for (const line of chunk.split('\n')) {
          if (!line.startsWith('data: ')) continue;
          const payload = line.slice(6).trim();
          if (payload === '[DONE]') break;
          try {
            const { text: token } = JSON.parse(payload);
            aiText += token;
            aiDiv.classList.remove('typing');
            updateBubble(aiDiv, aiText);
          } catch {}
        }
      }
    } catch {
      aiDiv.classList.remove('typing');
      updateBubble(aiDiv, '⚠ Connection error. Is the server running?');
    }

    history.push({ role: 'assistant', content: aiText });
    aiDiv.classList.remove('typing');
    streaming        = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }

  inputEl.addEventListener('input', () => {
    inputEl.style.height = '44px';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  sendBtn.addEventListener('click', send);
  clearBtn.addEventListener('click', () => {
    history = [];
    messagesEl.innerHTML = `
      <div class="welcome">
        <div class="icon">⚔️</div>
        <h2>For the Emperor</h2>
        <p>Ask me anything about Warhammer 40,000 rules, stat blocks, weapon profiles, stratagems, and faction abilities.</p>
      </div>`;
  });

  loadDbInfo();
  inputEl.focus();
</script>
</body>
</html>
